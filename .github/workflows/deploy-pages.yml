name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build app
        working-directory: app
        run: npx vite build

      - name: Package kiosk extension
        run: |
          cd kiosk-extension
          zip -r ../kiosk-extension.zip manifest.json managed_schema.json background.js content.js icon-48.png icon-128.png

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/extension
          cp -r site/* deploy/
          cp -r app/dist deploy/app
          cp -r kiosk-extension/* deploy/extension/
          cp kiosk-extension.zip deploy/extension/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
